# Pages placed under these sections will be shown on homepage and archive page.
mainSections = ["post"]
# Output page's full content in RSS.
rssFullContent = true
favicon        = "/CC.ico"

# Accepted values: "default", "lastmod"
# default = see https://gohugo.io/quick-reference/glossary/#default-sort-order
# lastmod = sort by last modified date, in descending order
SortBy              = "lastmod"

[footer]
    since      = 2023
    customText = ""

[dateFormat]
    published   = ":date_full"
    lastUpdated = ":date_full"

[sidebar]
    # emoji    = "🍥"
    subtitle = "Let life be beautiful like summer flowers."
    avatar   = "img/CC.ico"

[article]
    headingAnchor = false
    math          = true
    toc           = true
    readingTime   = true
    
    [article.list]
        # Showing article tags in the list view (e.g. homepage, section pages)
        showTags = false

    [article.license]
        enabled = true
        default = "Licensed under CC BY-NC-SA 4.0"

    [article.alertIcon]
        # Alert icons for different alert types (note, tip, important, warning, caution)
        note      = "📝"
        tip       = "💡"
        important = "📌"
        warning   = "⚠️"
        caution   = "🚨"

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } },
    ]
    page = [{ type = "toc" }]

[opengraph.twitter]
    site = ""
    card = "summary_large_image"

[colorScheme]
    toggle  = true
    default = "auto"

[imageProcessing]
    autoOrient = false

    [imageProcessing.external]
        timeout = "5s"

    [imageProcessing.content]
        widths  = [800, 1600, 2400]
        enabled = true

    [imageProcessing.thumbnail]
        enabled = true

## Comments
[comments]
    enabled  = false
    provider = "disqus"

    # See all the available configurations at https://github.com/CaiJimmy/hugo-theme-stack/blob/master/config/_default/params.toml
    # Copy the configurations you need from there and paste it here.
